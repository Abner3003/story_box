services:
  api:
    image: ghcr.io/${GHCR_USERNAME}/storybox-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - internal

  generation-worker:
    image: ghcr.io/${GHCR_USERNAME}/storybox-api:${IMAGE_TAG:-latest}
    command: ["node", "apps/api/dist/workers/generation.worker.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  scheduler-worker:
    image: ghcr.io/${GHCR_USERNAME}/storybox-api:${IMAGE_TAG:-latest}
    command: ["node", "apps/api/dist/workers/scheduler.worker.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  delivery-worker:
    image: ghcr.io/${GHCR_USERNAME}/storybox-api:${IMAGE_TAG:-latest}
    command: ["node", "apps/api/dist/workers/delivery.worker.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  regen-worker:
    image: ghcr.io/${GHCR_USERNAME}/storybox-api:${IMAGE_TAG:-latest}
    command: ["node", "apps/api/dist/workers/regen.worker.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  bull-board:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_PREFIX: bull
      BULL_VERSION: BULLMQ
      USER_LOGIN: ${BULL_BOARD_USER}
      USER_PASSWORD: ${BULL_BOARD_PASSWORD}
    depends_on:
      redis:
        condition: service_started
    ports:
      # só acessível localmente na VPS — via SSH tunnel (ssh -L 3002:localhost:3002 ...)
      # ou reverse proxy próprio, nunca exposto direto na internet
      - "127.0.0.1:3002:3000"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
